version: "3.9"

# ============================================================
# private-dns-demo — Docker Compose Stack
# ============================================================
# Services:
#   adguard      — DNS resolver + web UI (ports 53, 3000)
#   postgres     — database for admin-api
#   admin-api    — NestJS admin REST API (port 8080)
#   tg-bot       — Telegram bot
#   node-exporter— host metrics exporter (port 9100)
#   prometheus   — metrics aggregation (port 9090)
#   grafana      — dashboards (port 3001)
#   caddy        — TLS reverse proxy (profiles: [tls])
# ============================================================

x-restart: &restart-policy
  restart: unless-stopped

x-logging: &default-logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

networks:
  dns-net:
    driver: bridge

volumes:
  adguard-work:
  adguard-conf:
  postgres-data:
  prometheus-data:
  grafana-data:
  caddy-data:
  caddy-certs:

services:
  # ── AdGuard Home ────────────────────────────────────────────
  adguard:
    image: adguard/adguardhome:v0.107.52
    container_name: adguard
    <<: [*restart-policy, *default-logging]
    networks:
      - dns-net
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "3000:3000/tcp"   # Web UI
      - "8443:8443/tcp"   # DoH / DoT (HTTPS)
    volumes:
      - adguard-work:/opt/adguardhome/work
      - ./adguard/conf:/opt/adguardhome/conf
      - ./adguard/certs:/opt/adguardhome/certs:ro
    environment:
      TZ: ${TZ:-UTC}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    <<: [*restart-policy, *default-logging]
    networks:
      - dns-net
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dnsadmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-dnsadmin}
      TZ: ${TZ:-UTC}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dnsadmin} -d ${POSTGRES_DB:-dnsadmin}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Admin API ────────────────────────────────────────────────
  admin-api:
    build:
      context: ../admin-api
      dockerfile: Dockerfile
    container_name: admin-api
    <<: [*restart-policy, *default-logging]
    networks:
      - dns-net
    ports:
      - "8080:8080"
    volumes:
      # Mount deploy directory so firewall_apply.sh can be called from container
      - ../deploy:/deploy
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgres://${POSTGRES_USER:-dnsadmin}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-dnsadmin}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:?ADMIN_API_TOKEN is required}
      TZ: ${TZ:-UTC}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Telegram Bot ─────────────────────────────────────────────
  tg-bot:
    build:
      context: ../tg-bot
      dockerfile: Dockerfile
    container_name: tg-bot
    <<: [*restart-policy, *default-logging]
    networks:
      - dns-net
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN is required}
      ADMIN_IDS: ${ADMIN_IDS:?ADMIN_IDS is required}
      ADMIN_API_URL: ${ADMIN_API_URL:-http://admin-api:8080}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:?ADMIN_API_TOKEN is required}
      TZ: ${TZ:-UTC}
    depends_on:
      admin-api:
        condition: service_healthy

  # ── Node Exporter ────────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: node-exporter
    <<: [*restart-policy, *default-logging]
    networks:
      - dns-net
    ports:
      - "127.0.0.1:9100:9100"
    command:
      - "--path.rootfs=/host"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /:/host:ro,rslave
    pid: host

  # ── Prometheus ───────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.49.1
    container_name: prometheus
    <<: [*restart-policy, *default-logging]
    networks:
      - dns-net
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    depends_on:
      - node-exporter

  # ── Grafana ──────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.3.1
    container_name: grafana
    <<: [*restart-policy, *default-logging]
    networks:
      - dns-net
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:?GF_ADMIN_PASSWORD is required}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s:%(http_port)s/"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      TZ: ${TZ:-UTC}
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Caddy (optional TLS — only with --profile tls) ───────────
  caddy:
    image: caddy:2.7-alpine
    container_name: caddy
    profiles:
      - tls
    <<: [*restart-policy, *default-logging]
    networks:
      - dns-net
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-certs:/config
    environment:
      DNS_DOMAIN: ${DNS_DOMAIN:-}
      ADMIN_IPS: ${ADMIN_IPS:-}
      TZ: ${TZ:-UTC}
    depends_on:
      - adguard
